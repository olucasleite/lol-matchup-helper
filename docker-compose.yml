services:
  db:
    image: postgres:18.2-alpine
    container_name: postgres_db_lol
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev
    ports:
      - 5432:5432
    volumes:
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql

  app:
    build: .
    container_name: node_app_lol
    ports:
      - "3000:3000"
    volumes:
      - server:/usr/src
      - node_modules_data:/usr/src/node_modules
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata:
  node_modules_data:
  server:
